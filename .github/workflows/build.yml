name: Build
on:
  workflow_dispatch:
    inputs:
      revision:
        description: 'Repository revision'
        required: false
        default: 'master'
      target:
        description: 'Build target'
        required: true
      build_amd64:
        description: 'Build on amd64'
        required: false
        default:  false
        type: boolean
      build_arm64:
        description: 'Build on arm64'
        required: false
        default:  true
        type: boolean
      build_macos:
        description: 'Build on macOS'
        required: false
        default:  false
        type: boolean
jobs:
  build:
    if: github.actor == 'roshanrags'
    name: Build
    strategy:
      matrix:
        runs-on:
        - 'ubicloud-standard-4'
        - 'ubicloud-standard-4-arm'
        - 'macos-latest'
        exclude:
        # If build_macos is false, this becomes 'macos-latest' and excludes the job.
        # If true, it evaluates to an empty string and excludes nothing.
        - runs-on: ${{ !inputs.build_macos && 'macos-latest' || '' }}
        - runs-on: ${{ !inputs.build_amd64 && 'ubicloud-standard-4' || '' }}
        - runs-on: ${{ !inputs.build_arm64 && 'ubicloud-standard-4-arm' || '' }}
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: echo
      run: |
        echo revision ${{ inputs.revision }}
        echo target ${{ inputs.target }}
    - name: Install Nix
      uses: cachix/install-nix-action@v30
    - name: Cachix
      uses: cachix/cachix-action@v15
      with:
        name: marlin
        authToken: ${{secrets.CACHIX_AUTH_TOKEN}}
        useDaemon: false
    - name: Check if derivation exists in Cachix
      id: check_cache
      run: |
        # Get the out-path of the derivation
        OUT_PATH=$(nix eval --accept-flake-config github:marlinprotocol/marlin/${{ inputs.revision }}#${{ inputs.target }}.outPath --raw)        
        if nix path-info --store https://marlin.cachix.org "$OUT_PATH" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Artifact already exists in Cachix. Skipping build."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Artifact not found. Proceeding with build."
        fi
    - name: permissions
      run: |
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        sudo sysctl -w kernel.unprivileged_userns_clone=1
    - name: build
      if: steps.check_cache.outputs.exists != 'true'
      run: nix build -vL --accept-flake-config github:marlinprotocol/marlin/${{ inputs.revision }}#${{ inputs.target }}
